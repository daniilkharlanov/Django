{% load static %}
<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Портфолио — Даниил Харланов{% endblock %}</title>
    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons or Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap
icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Google Fonts (опционально) -->
    <link href="https://fonts.googleapis.com/css2?
family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .hero {
            background: #f8fafc;
            padding: 4rem 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="d-flex justify-content-center py-3">
            <ul class="nav nav-pills">
                <li class="nav-item">
                    <a href="{% url 'home' %}"
                        class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">Главная</a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'advantages' %}"
                        class="nav-link {% if request.resolver_match.url_name == 'advantages' %}active{% endif %}">
                        Преимущества
                    </a>
                </li>
                <li class="nav-item"><a href="{% url 'prices' %}"
                        class="nav-link {% if request.resolver_match.url_name == 'prices' %}active{% endif %}">Цены</a>
                </li>
                <li class="nav-item"><a href="{% url 'faqs' %}"
                        class="nav-link {% if request.resolver_match.url_name == 'faqs' %}active{% endif %}">FAQs</a>
                </li>
                <li class="nav-item"><a href="{% url 'about' %}"
                        class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}">О
                        сайте</a></li>
            </ul>
        </header>
    </div>

    <main>

        {% block content %}
        {% endblock %}

    </main>
    <footer class="py-3 my-4">
        <ul class="nav justify-content-center border-bottom pb-3 mb-3">
            <li class="nav-item"><a href="{% url 'home' %}" class="nav-link px-2 text-body-secondary">Главная</a></li>
            <li class="nav-item"><a href="{% url 'advantages' %}" class="nav-link px-2 text-body-secondary">Преимущества</a></li>
            <li class="nav-item"><a href="{% url 'prices' %}" class="nav-link px-2 text-body-secondary">Цены</a></li>
            <li class="nav-item"><a href="{% url 'faqs' %}" class="nav-link px-2 text-body-secondary">FAQs</a></li>
            <li class="nav-item"><a href="{% url 'about' %}" class="nav-link px-2 text-body-secondary">О сайте</a></li>
        </ul>
        <p class="text-center text-body-secondary">© 2026 Company, Inc</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>

</html>
